<style>
* {

}
.korean-text {

}
body {

}
.glass-header {

}
.sidebar-bg {

}
.active-nav {

}
.status-active {

}
.status-pending {

}
.status-review {

color: #b45309;
}
.status-rejected {
background-color: #fef2f2;
color: #ba1a1a;
}
.status-verified {
background-color: #f0fdf4;
color: #006243;
}
.status-critical {
background-color: #fef2f2;
color: #ba1a1a;
}
.metric-card {
background: white;
border-radius: 0.75rem;
padding: 1.25rem;
box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
.metric-value {
font-size: 1.875rem;
font-weight: 700;
color: #191c1e;
margin: 0.5rem 0;
}
.metric-label {
font-size: 0.875rem;
color: #94a3b8;
font-weight: 500;
}
.metric-change {
font-size: 0.875rem;
font-weight: 600;
margin-top: 0.5rem;
}
.metric-change.positive {
color: #16a34a;
}
.metric-change.negative {
color: #ba1a1a;
}
.gradient-button {
background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);

border: none;
padding: 0.625rem 1.25rem;

cursor: pointer;

}
.gradient-button:hover {
opacity: 0.9;
}
.insight-card {
background: white;
border-radius: 0.75rem;

}
.insight-card.blue {
border-left-color: #004ac6;
}
.insight-card.green {
border-left-color: #006243;
}
.insight-card.yellow {
border-left-color: #eab308;
}
.insight-card.gray {
border-left-color: #94a3b8;
}
.insight-title {
font-size: 0.875rem;
font-weight: 600;
color: #64748b;
text-transform: uppercase;
letter-spacing: 0.05em;
}
.insight-content {
font-size: 0.95rem;
color: #191c1e;
margin-top: 0.5rem;
font-weight: 500;
}
.table-container {
background: white;
border-radius: 0.75rem;

box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
.table-header {
background-color: #f8fafc;
border-bottom: 1px solid #e2e8f0;
}
.table-header th {
padding: 1rem;
text-align: left;
font-weight: 600;
font-size: 0.875rem;
color: #64748b;
}
.table-row {
border-bottom: 1px solid #e2e8f0;

}
.table-row:last-child {
border-bottom: none;
}
.table-row:hover {
background-color: #f8fafc;
}
.table-cell {
padding: 1rem;
font-size: 0.875rem;
}
.progress-bar {
background-color: #e2e8f0;
border-radius: 9999px;
height: 0.5rem;
overflow: hidden;
}
.progress-fill {
background: linear-gradient(90deg, #004ac6 0%, #2563eb 100%);
height: 100%;

transition: width 0.3s ease;
}
.page-fade-in {
animation: fadeIn 0.3s ease-in-out;
}
@keyframes fadeIn {
from {
opacity: 0;
}
to {
opacity: 1;
}
}
.chip {
display: inline-block;
padding: 0.25rem 0.75rem;
border-radius: 9999px;
font-size: 0.75rem;
font-weight: 600;

}
.chip.blue {
background-color: #dbeafe;
color: #0c4a6e;
}
.chip.green {
background-color: #dcfce7;
color: #166534;
}
.chip.yellow {
background-color: #fef3c7;
color: #92400e;
}
.chip.red {
background-color: #fee2e2;
color: #7f1d1d;
}
.chart-container {

border-radius: 0.75rem;
padding: 1.5rem;
box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
.section-title {
font-size: 1.125rem;

.section-label {

margin-bottom: 0.5rem;
}
.step-indicator {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 2rem;
position: relative;
}
.step-indicator::before {
content: '';
position: absolute;
top: 20px;
left: 0;
right: 0;
height: 2px;
background-color: #e2e8f0;
z-index: 0;
}
.step-circle {
width: 40px;
height: 40px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-weight: 600;
font-size: 0.875rem;
position: relative;
z-index: 1;
transition: all 0.3s ease;
background-color: #e2e8f0;
color: #94a3b8;
}
.step-circle.active {
background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
color: white;
box-shadow: 0 4px 12px rgba(0, 74, 198, 0.3);
}
.step-circle.completed {
background-color: #006243;
color: white;
}
.step-label {
font-size: 0.75rem;
font-weight: 600;
color: #94a3b8;
margin-top: 0.75rem;
text-align: center;
}
.step-label.active {
color: #004ac6;
}
.drop-zone {
border: 2px dashed #004ac6;
border-radius: 0.75rem;
padding: 2rem;
text-align: center;
cursor: pointer;
transition: all 0.2s;
background-color: #f0f6ff;
}
.drop-zone:hover,
.drop-zone.dragover {
background-color: #e0effe;
border-color: #2563eb;
}
.drop-zone-icon {
width: 48px;
height: 48px;
margin: 0 auto 1rem;
color: #004ac6;
}
.file-list {
background: white;
border-radius: 0.75rem;
padding: 1.25rem;
margin-top: 1rem;
}
.file-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0.75rem;
border-bottom: 1px solid #e2e8f0;
font-size: 0.875rem;
}
.file-item:last-child {
border-bottom: none;
}
.before-after {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1.5rem;
}
.before-after-card {
background: white;
border-radius: 0.75rem;
padding: 1.5rem;
box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
.before-after-title {
font-size: 0.875rem;
font-weight: 600;
color: #64748b;
text-transform: uppercase;
letter-spacing: 0.05em;
margin-bottom: 1rem;
}
.cleaning-rule {
background: white;
border-radius: 0.75rem;
padding: 1.25rem;
margin-bottom: 1rem;
border-left: 4px solid #004ac6;
display: flex;
align-items: center;
gap: 1rem;
}
.cleaning-rule.applied {
border-left-color: #006243;
}
.rule-toggle {
width: 48px;
height: 28px;
border-radius: 9999px;
background-color: #e2e8f0;
border: none;
cursor: pointer;
transition: background-color 0.3s;
position: relative;
padding: 0;
}
.rule-toggle.active {
background-color: #006243;
}
.rule-toggle::after {
content: '';
position: absolute;
width: 24px;
height: 24px;
border-radius: 50%;
background-color: white;
top: 2px;
left: 2px;
transition: left 0.3s;
}
.rule-toggle.active::after {
left: 22px;
}
.rule-info {
flex: 1;
}
.rule-name {
font-weight: 600;
color: #191c1e;
margin-bottom: 0.25rem;
}
.rule-description {
font-size: 0.875rem;
color: #64748b;
}
.rule-count {
font-size: 0.875rem;
font-weight: 600;
color: #004ac6;
}
.summary-stat {
background: white;
border-radius: 0.75rem;
padding: 1.25rem;
text-align: center;
box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
.summary-stat-value {
font-size: 1.875rem;
font-weight: 700;
color: #191c1e;
margin: 0.5rem 0;
}
.summary-stat-label {
font-size: 0.875rem;
color: #94a3b8;
font-weight: 500;
}
.success-animation {
animation: successPulse 0.6s ease-out;
}
@keyframes successPulse {
0% {
transform: scale(0.8);
opacity: 0;
}
50% {
transform: scale(1.05);
}
100% {
transform: scale(1);
opacity: 1;
}
}
.step-content {
animation: contentFadeIn 0.3s ease-in-out;
}
@keyframes contentFadeIn {
from {
opacity: 0;
transform: translateY(10px);
}
to {
opacity: 1;
transform: translateY(0);
}
}
</style>
</head>

const data = window.XLSX.utils.sheet_to_json(firstSheet);

console.error('Error reading file:', error);
}
};
reader.readAsBinaryString(file);

seen.add(key);
return true;

cleaned = cleaned.map(row => {

return formatted;

onClick={() => setCurrentStep(3)}
className="px-6 py-2 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition"
>
이전
</button>
<button
onClick={() => {
const ws = window.XLSX.utils.json_to_sheet(cleanedData.filter(r => !r._flagged));
const wb = window.XLSX.utils.book_new();
window.XLSX.utils.book_append_sheet(wb, ws, 'Cleaned Data');
window.XLSX.writeFile(wb, 'cleaned_data.xlsx');
}}
className="px-6 py-2 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition flex items-center gap-2"
>
<IconDownload className="w-4 h-4" />
다운로드
</button>
<button
onClick={() => setCurrentStep(5)}
className="gradient-button px-6 py-2"
>
다음
</button>
</div>
</div>
)}

{currentStep === 5 && (
<div className="step-content space-y-6">
<div className="chart-container">
<p className="section-label">Step 5</p>
<p className="section-title">데이터 반영 확인</p>

<div className={`rounded-lg border-2 border-green-200 bg-green-50 p-6 text-center ${success ? 'success-animation' : ''}`}>
<IconCheckCircle className="w-16 h-16 mx-auto text-green-600 mb-4" />
<p className="text-lg font-bold text-green-900">정제 완료</p>
<p className="text-sm text-green-700 mt-2">
{cleanedData.filter(r => !r._flagged).length}개의 정제된 행이 대시보드에 반영될 준비가 완료되었습니다.
</p>
</div>

<div className="bg-white rounded-lg border border-slate-200 p-6">
<p className="font-semibold text-slate-900 mb-4">반영 요약</p>
<div className="space-y-3 text-sm">
<div className="flex justify-between">
<span className="text-slate-600">원본 데이터</span>
<span className="font-medium text-slate-900">{rawData.length}개 행</span>
</div>
<div className="flex justify-between border-t pt-3">
<span className="text-slate-600">정제된 데이터</span>
<span className="font-medium text-slate-900">{cleanedData.filter(r => !r._flagged).length}개 행</span>
</div>
<div className="flex justify-between">
<span className="text-slate-600">플래그된 이상치</span>
<span className="font-medium text-slate-900">{cleanedData.filter(r => r._flagged).length}개 행</span>
</div>
<div className="flex justify-between border-t pt-3">
<span className="text-slate-600">정제율</span>
<span className="font-medium text-green-600">{((cleanedData.filter(r => !r._flagged).length / rawData.length) * 100).toFixed(1)}%</span>
</div>
</div>
</div>

<div className="flex gap-4 justify-between">
<button
onClick={() => setCurrentStep(4)}
className="px-6 py-2 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition"
>
이전
</button>
<button
onClick={() => {
setSuccess(true);
onApplyData(cleanedData.filter(r => !r._flagged));
setTimeout(() => {
setCurrentStep(1);
setUploadedFiles([]);
setRawData([]);
setCleanedData([]);
setSuccess(false);
}, 2000);
}}
className="gradient-button px-6 py-2 flex items-center gap-2"
>
<IconCheckCircle className="w-4 h-4" />
대시보드에 반영
</button>
</div>
</div>
)}
</div>
);
};

// Main App Component
const App = () => {
const [currentPage, setCurrentPage] = useState('home');
const [pipelineData, setPipelineData] = useState([]);

const pageMap = {
'home': <CEOInsightBoard />,
'operations': <OperationsDashboard pipelineData={pipelineData} />,
'contracts': <ContractsMaster />,
'approvals': <ApprovalCenter />,
'anomalies': <AnomalyDetection />,
'theater': <TheaterPerformance />,
'cashflow': <CashFlowForecast />,
'quality': <DataQuality />,
'journal': <JournalEntries />,
'settlement': <SettlementDetail />,
'pipeline': <DataPipeline onApplyData={(data) => setPipelineData(data)} />
};

useEffect(() => {
const handleHashChange = () => {
const hash = window.location.hash.slice(1) || 'home';
setCurrentPage(hash);
};
window.addEventListener('hashchange', handleHashChange);
handleHashChange();
return () => window.removeEventListener('hashchange', handleHashChange);
}, []);

return (
<div className="flex h-screen bg-slate-50">
<Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} />
<div className="flex-1 flex flex-col ml-64">
<Header currentPage={currentPage} />
<main className="flex-1 overflow-auto pt-20 px-8 pb-8">
{pageMap[currentPage] || pageMap['home']}
</main>
</div>
</div>
);
};

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
